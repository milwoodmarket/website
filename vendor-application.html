<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vendor Application — Milwood Market</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900;1,700&family=Lato:wght@300;400;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --cream:   #F5F0E8;
      --tan:     #E8DCC8;
      --brown:   #6B4C2A;
      --rust:    #C4521A;
      --green:   #3A5C3B;
      --gold:    #D4A843;
      --charcoal:#2C2416;
      --white:   #FDFAF4;
      --ff-display: 'Playfair Display', Georgia, serif;
      --ff-body:    'Lato', sans-serif;
    }
    body {
      font-family: var(--ff-body);
      background-color: var(--cream);
      color: var(--charcoal);
    }
    nav {
      position: sticky;
      top: 0;
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 1rem 2.5rem;
      background: rgba(245,240,232,0.97);
      border-bottom: 1px solid var(--tan);
    }
    .nav-logo {
      font-family: var(--ff-display);
      font-weight: 900;
      font-size: 1.3rem;
      color: var(--brown);
      text-decoration: none;
    }
    .nav-back {
      font-family: var(--ff-body);
      font-weight: 700;
      font-size: 0.78rem;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      color: var(--brown);
      text-decoration: none;
      display: flex;
      align-items: center;
      gap: 0.4rem;
      transition: color 0.2s;
    }
    .nav-back:hover { color: var(--rust); }
    .page-header {
      text-align: center;
      padding: 4rem 2rem 2rem;
    }
    .section-label {
      font-family: var(--ff-body);
      font-weight: 700;
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 0.2em;
      color: var(--rust);
      margin-bottom: 0.6rem;
    }
    .page-title {
      font-family: var(--ff-display);
      font-weight: 900;
      font-size: clamp(2.2rem, 5vw, 3.5rem);
      color: var(--charcoal);
      line-height: 1.05;
    }
    .page-title em { font-style: italic; color: var(--green); }
    .divider {
      width: 56px; height: 3px;
      background: var(--gold);
      margin: 1.2rem auto 1.5rem;
    }
    .page-intro {
      font-size: 1rem;
      color: #4A3C28;
      max-width: 560px;
      margin: 0 auto;
      line-height: 1.7;
    }
    .form-wrapper {
      display: flex;
      justify-content: center;
      padding: 1rem 0.5rem 3rem;
    }
    iframe {
      width: 100%;
      max-width: 860px;
      border: none;
      border-radius: 8px;
      box-shadow: 0 4px 32px rgba(107,76,42,0.1);
    }
    footer {
      background: var(--charcoal);
      padding: 2rem;
      text-align: center;
    }
    .footer-logo {
      font-family: var(--ff-display);
      font-size: 1.4rem;
      font-weight: 900;
      color: var(--white);
    }
    .footer-logo em { font-style: italic; color: var(--gold); }
    .contact-note {
      text-align: center;
      font-size: 0.9rem;
      color: #6B5A42;
      padding-bottom: 3rem;
    }
    .contact-note a {
      color: var(--rust);
      text-decoration: none;
      font-weight: 700;
    }
    .contact-note a:hover { text-decoration: underline; }
  </style>
</head>
<body>

<nav>
  <span class="nav-logo">Milwood Market</span>
  <a href="https://www.milwoodmarket.com" style="font-family:var(--ff-body);font-weight:700;font-size:0.78rem;text-transform:uppercase;letter-spacing:0.1em;color:var(--brown);text-decoration:none;transition:color 0.2s;" onmouseover="this.style.color="#C4521A"" onmouseout="this.style.color="#6B4C2A"">Go to milwoodmarket.com →</a>
</nav>

<div class="page-header">
  <p class="section-label">Join Us</p>
  <h1 class="page-title">Vendor <em>Application</em></h1>
  <div class="divider"></div>
  <p class="page-intro">Ready to be part of Milwood Market? Fill out the form below and we'll be in touch. Vendor applications are reviewed on a rolling basis.</p>
</div>

<div class="form-wrapper">
  <iframe aria-label='Milwood Market – Vendor Application' frameborder="0" allow="camera;" style="height:3300px;width:99%;border:none;" src='https://forms.zohopublic.com/hellomilwoo1/form/vendorapplication/formperma/qPSr-pV0Rn2KcIvMqV8svA1DhrLt6LRvf2wKDYW-Wc4?zf_enablecamera=true'></iframe>
</div>

<div style="text-align:center; padding: 1rem 2rem 3rem; display:flex; gap:0.8rem; justify-content:center; flex-wrap:wrap; align-items:center;">
  <a href="vendor-basics.html" class="btn btn-outline" style="color:var(--brown); border-color:var(--tan); background:var(--white);">← Vendor Basics</a>
  <a href="vendor-rules.html" class="btn btn-outline" style="color:var(--brown); border-color:var(--tan); background:var(--white);">Rules & Terms</a>
</div>

  <p class="contact-note">Questions? Email us at <span id="email-link"></span></p>
  <script>
    var e = 'hello' + '@' + 'milwoodmarket.com';
    var el = document.getElementById('email-link');
    el.innerHTML = '<a href="mailto:' + e + '" style="color:#C4521A;font-weight:700;text-decoration:none;">' + e + '</a>';
  </script>

<footer>
  <div class="footer-logo">Milwood <em>Market</em></div>
</footer>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --cream:   #F5F0E8;
      --tan:     #E8DCC8;
      --brown:   #6B4C2A;
      --rust:    #C4521A;
      --green:   #3A5C3B;
      --gold:    #D4A843;
      --charcoal:#2C2416;
      --white:   #FDFAF4;
      --ff-display: 'Playfair Display', Georgia, serif;
      --ff-body:    'Lato', sans-serif;
    }
    body {
      font-family: var(--ff-body);
      background-color: var(--cream);
      color: var(--charcoal);
    }
    nav {
      position: sticky;
      top: 0;
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 1rem 2.5rem;
      background: rgba(245,240,232,0.97);
      border-bottom: 1px solid var(--tan);
    }
    .nav-logo {
      font-family: var(--ff-display);
      font-weight: 900;
      font-size: 1.3rem;
      color: var(--brown);
      text-decoration: none;
    }
    .nav-back {
      font-family: var(--ff-body);
      font-weight: 700;
      font-size: 0.78rem;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      color: var(--brown);
      text-decoration: none;
      display: flex;
      align-items: center;
      gap: 0.4rem;
      transition: color 0.2s;
    }
    .nav-back:hover { color: var(--rust); }
    .page-header {
      text-align: center;
      padding: 4rem 2rem 2rem;
    }
    .section-label {
      font-family: var(--ff-body);
      font-weight: 700;
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 0.2em;
      color: var(--rust);
      margin-bottom: 0.6rem;
    }
    .page-title {
      font-family: var(--ff-display);
      font-weight: 900;
      font-size: clamp(2.2rem, 5vw, 3.5rem);
      color: var(--charcoal);
      line-height: 1.05;
    }
    .page-title em { font-style: italic; color: var(--green); }
    .divider {
      width: 56px; height: 3px;
      background: var(--gold);
      margin: 1.2rem auto 1.5rem;
    }
    .page-intro {
      font-size: 1rem;
      color: #4A3C28;
      max-width: 560px;
      margin: 0 auto;
      line-height: 1.7;
    }
    .form-wrapper {
      display: flex;
      justify-content: center;
      padding: 1rem 0.5rem 3rem;
      overflow: hidden;
      width: 100%;
    }
    iframe {
      width: 100%;
      max-width: 860px;
      border: none;
      border-radius: 8px;
      box-shadow: 0 4px 32px rgba(107,76,42,0.1);
    }
    footer {
      background: var(--charcoal);
      padding: 2rem;
      text-align: center;
    }
    .footer-logo {
      font-family: var(--ff-display);
      font-size: 1.4rem;
      font-weight: 900;
      color: var(--white);
    }
    .footer-logo em { font-style: italic; color: var(--gold); }
    .contact-note {
      text-align: center;
      font-size: 0.9rem;
      color: #6B5A42;
      padding-bottom: 3rem;
    }
    .contact-note a {
      color: var(--rust);
      text-decoration: none;
      font-weight: 700;
    }
    .contact-note a:hover { text-decoration: underline; }
  </style>
</head>

</nav>

<div class="page-header">

<div class="form-wrapper">
  <div id="zf_div_qPSr-pV0Rn2KcIvMqV8svA1DhrLt6LRvf2wKDYW-Wc4"></div>
  <script type="text/javascript">
  (function() {
    try{
      var f = document.createElement("iframe");
      var ifrmSrc = 'https://forms.zohopublic.com/hellomilwoo1/form/vendorapplication/formperma/qPSr-pV0Rn2KcIvMqV8svA1DhrLt6LRvf2wKDYW-Wc4?zf_rszfm=1&zf_enablecamera=true';
      try{
        if ( typeof ZFAdvLead != "undefined" && typeof zfutm_zfAdvLead != "undefined" ) {
          for( var prmIdx = 0 ; prmIdx < ZFAdvLead.utmPNameArr.length ; prmIdx ++ ) {
            var utmPm = ZFAdvLead.utmPNameArr[ prmIdx ];
            utmPm = ( ZFAdvLead.isSameDomian && ( ZFAdvLead.utmcustPNameArr.indexOf(utmPm) == -1 ) ) ? "zf_" + utmPm : utmPm;
            var utmVal = zfutm_zfAdvLead.zfautm_gC_enc( ZFAdvLead.utmPNameArr[ prmIdx ] );
            if ( typeof utmVal !== "undefined" ) {
              if ( utmVal != "" ) {
                if(ifrmSrc.indexOf('?') > 0){ ifrmSrc = ifrmSrc+'&'+utmPm+'='+utmVal; }
                else{ ifrmSrc = ifrmSrc+'?'+utmPm+'='+utmVal; }
              }
            }
          }
        }
        if ( typeof ZFLead !== "undefined" && typeof zfutm_zfLead !== "undefined" ) {
          for( var prmIdx = 0 ; prmIdx < ZFLead.utmPNameArr.length ; prmIdx ++ ) {
            var utmPm = ZFLead.utmPNameArr[ prmIdx ];
            var utmVal = zfutm_zfLead.zfutm_gC_enc( ZFLead.utmPNameArr[ prmIdx ] );
            if ( typeof utmVal !== "undefined" ) {
              if ( utmVal != "" ){
                if(ifrmSrc.indexOf('?') > 0){ ifrmSrc = ifrmSrc+'&'+utmPm+'='+utmVal; }
                else{ ifrmSrc = ifrmSrc+'?'+utmPm+'='+utmVal; }
              }
            }
          }
        }
      }catch(e){}
      f.src = ifrmSrc;
      f.style.border="none";
      f.style.height="4374px";
      f.style.width="90vw";
      f.style.transition="all 0.5s ease";
      f.style.overflow="hidden";
      f.scrolling="no";
      f.setAttribute("aria-label", 'Milwood Market – Vendor Application');
      f.setAttribute("allow","camera;");
      f.setAttribute("scrolling","no");
      var d = document.getElementById("zf_div_qPSr-pV0Rn2KcIvMqV8svA1DhrLt6LRvf2wKDYW-Wc4");
      d.appendChild(f);
      window.addEventListener('message', function (){
        var evntData = event.data;
        if( evntData && evntData.constructor == String ){
          var zf_ifrm_data = evntData.split("|");
          if ( zf_ifrm_data.length == 2 || zf_ifrm_data.length == 3 ) {
            var zf_perma = zf_ifrm_data[0];
            var zf_ifrm_ht_nw = ( parseInt(zf_ifrm_data[1], 10) + 15 ) + "px";
            var iframe = document.getElementById("zf_div_qPSr-pV0Rn2KcIvMqV8svA1DhrLt6LRvf2wKDYW-Wc4").getElementsByTagName("iframe")[0];
            if ( (iframe.src).indexOf('formperma') > 0 && (iframe.src).indexOf(zf_perma) > 0 ) {
              var prevIframeHeight = iframe.style.height;
              var zf_tout = false;
              if( zf_ifrm_data.length == 3 ) {
                iframe.scrollIntoView();
                zf_tout = true;
              }
              if ( prevIframeHeight != zf_ifrm_ht_nw ) {
                if( zf_tout ) {
                  setTimeout(function(){ iframe.style.height = zf_ifrm_ht_nw; },500);
                } else {
                  iframe.style.height = zf_ifrm_ht_nw;
                }
              }
            }
          }
        }
      }, false);
    }catch(e){}
  })();
  </script>
